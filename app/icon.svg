<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square with indigo-to-violet gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Pocket / vault body -->
  <rect x="7" y="10" width="18" height="14" rx="3" fill="white" fill-opacity="0.15" stroke="white" stroke-width="1.5"/>

  <!-- Lock shackle (top arc) -->
  <path d="M12 10 V8 a4 4 0 0 1 8 0 V10" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Lock keyhole circle -->
  <circle cx="16" cy="17" r="2.2" fill="white"/>

  <!-- Keyhole slot -->
  <rect x="15.1" y="17.5" width="1.8" height="2.8" rx="0.9" fill="white"/>

  <!-- Small "D" letter hint — top-left corner dot -->
  <circle cx="9.5" cy="12.5" r="1" fill="white" fill-opacity="0.5"/>
</svg>
